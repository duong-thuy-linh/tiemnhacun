<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiệm PhotoBooth nhà Cún ❤️ - Chụp Ảnh Online</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&family=Mali:wght@600&family=Dancing+Script:wght@700&family=Itim&family=Patrick+Hand&family=Lobster&family=Comfortaa:wght@700&family=Caveat:wght@700&family=Sriracha&display=swap" rel="stylesheet">
    
    <style>
        /* 🎨 BẢNG MÀU CHỦ ĐẠO - Tone Pastel ngọt ngào */
        :root { 
            --pink-main: #ff6699; 
            --pink-light: #fff0f3; 
            --blue-btn: #3c72e2; 
            --bg-site: #fdf8f9; 
            --shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        /* ✨ RESET & THIẾT LẬP CHUNG */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif; 
            background: var(--bg-site); 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; width: 100%;
        }

        /* 📦 CONTAINER CHÍNH - Các phần tử xếp hàng dọc (Vertical) */
        .main-container { 
            display: flex; flex-direction: column; gap: 20px; 
            padding: 15px; max-width: 500px; width: 100%; 
        }

        /* 🎀 KHỐI CHỨC NĂNG (BƯỚC 1, 2, 3) */
        .step-block { 
            background: white; border-radius: 25px; padding: 20px; 
            box-shadow: var(--shadow); width: 100%; border: 1px solid #ffeef2;
        }

        /* 🐶 TIÊU ĐỀ LOGO */
        .header-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px; }
        .logo-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--pink-main); object-fit: cover; }
        .shop-name { font-family: 'Pacifico', cursive; color: var(--pink-main); font-size: 30px; margin: 0; }

        /* 🎥 CAMERA AREA */
        .video-box { 
            width: 100%; background: #000; border-radius: 20px; overflow: hidden; 
            position: relative; aspect-ratio: 4/3; margin: 15px 0; border: 5px solid white; 
            display: flex; align-items: center; justify-content: center;
        }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #countdown { position:absolute; font-size:80px; color:white; font-family:'Pacifico'; text-shadow:2px 2px 10px rgba(0,0,0,0.5); z-index: 10; }
        #flash-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 99; }
        .flash-active { animation: flash-anim 0.3s ease-out; }
        @keyframes flash-anim { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* 🔘 NÚT BẤM (BUTTONS) */
        .btn { 
            background: var(--pink-main); color: #fff; padding: 15px; border: none; border-radius: 30px; 
            font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 4px 0 #d64574; 
            margin-bottom: 10px; transition: 0.2s; font-size: 14px; 
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #d64574; }

        /* 🎞️ THANH CUỘN (SLIDERS) */
        .slider { 
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 5px; 
            margin-bottom: 15px; -webkit-overflow-scrolling: touch;
        }
        .slider::-webkit-scrollbar { height: 4px; }
        .slider::-webkit-scrollbar-thumb { background: var(--pink-main); border-radius: 10px; }

        /* 🎨 OPTION BUTTONS (Bộ lọc, Bố cục) */
        .opt-btn { padding: 8px 15px; border-radius: 20px; border: 2px solid #eee; background: white; white-space: nowrap; font-size: 12px; font-weight: 600; cursor: pointer; }
        .opt-btn.active { background: var(--pink-main); color: white; border-color: var(--pink-main); }

        /* 🌈 CHẤM CHỌN MÀU */
        .color-dot { width: 35px; height: 35px; border-radius: 50%; border: 3px solid white; flex-shrink: 0; box-shadow: var(--shadow); cursor: pointer; }

        /* 🎞️ KHU VỰC KẾT QUẢ (CANVAS) */
        #result-area { 
            background: white; padding: 10px; border: 1px solid #eee; position: relative; 
            width: fit-content; margin: 0 auto; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-radius: 5px; 
        }
        canvas { max-width: 100%; height: auto; display: block; }
        #sticker-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; overflow: hidden; }
        .draggable { position: absolute; pointer-events: auto; cursor: move; user-select: none; touch-action: none; white-space: nowrap; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2)); }

        /* 💬 CHÚ THÍCH NHỎ */
        .title-small { font-size: 11px; color: #888; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; display: block; letter-spacing: 1px;}
        .text-input { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #ffcad4; margin-bottom: 10px; outline: none; font-family: 'Quicksand'; font-weight: 600;}
    </style>
</head>
<body>

<div class="main-container">

    <section class="step-block">
        <div class="header-logo">
            <img src="logo.jpg" class="logo-img" onerror="this.src='https://via.placeholder.com/50/ff6699/fff?text=Cún'">
            <h1 class="shop-name">Tiệm nhà Cún ❤️</h1>
        </div>

        <span class="title-small">📸 Bước 1: Chọn màu ảnh & Chụp</span>
        <div class="slider" id="filter-list">
            <button class="opt-btn active" onclick="setFilter('none', this)">Gốc (Mặc định)</button>
            <button class="opt-btn" onclick="setFilter('brightness(1.1) saturate(1.2)', this)">Trắng Sáng</button>
            <button class="opt-btn" onclick="setFilter('grayscale(100%)', this)">Trắng Đen</button>
            <button class="opt-btn" onclick="setFilter('sepia(60%)', this)">Vintage</button>
            <button class="opt-btn" onclick="setFilter('hue-rotate(330deg) saturate(1.1)', this)">Hồng Xinh</button>
            <button class="opt-btn" onclick="setFilter('contrast(1.2) saturate(1.5)', this)">Rực Rỡ</button>
        </div>

        <div class="video-box">
            <video id="video" autoplay playsinline></video>
            <div id="flash-overlay"></div>
            <div id="countdown"></div>
        </div>

        <button class="btn" style="background:#f1c40f; box-shadow:0 4px 0 #d3a406; color:#333;" onclick="toggleTorch()">🔦 BẬT ĐÈN TRỢ SÁNG</button>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn" onclick="capturePhoto()">📸 CHỤP ĐƠN</button>
            <button class="btn" style="background:#6c5ce7; box-shadow:0 4px 0 #4d3eb9;" onclick="startAutoCapture()">🤖 AUTO CHỤP (4)</button>
        </div>
        
        <button class="btn" style="background:#2ecc71; box-shadow:0 4px 0 #219150;" onclick="document.getElementById('up').click()">📤 TẢI ẢNH CÓ SẴN</button>
        <input type="file" id="up" hidden multiple onchange="handleUpload(event)">
    </section>

    <section class="step-block">
        <span class="title-small">📏 Bước 2: Chọn khung & Dán Sticker</span>
        
        <div class="slider" id="layout-list">
            <button class="opt-btn" onclick="setLayout(1,'v',this)">1 Ảnh</button>
            <button class="opt-btn" onclick="setLayout(2,'v',this)">2 Dọc</button>
            <button class="opt-btn active" onclick="setLayout(4,'v',this)">4 Dọc (Hot)</button>
            <button class="opt-btn" onclick="setLayout(4,'h',this)">4 Ngang</button>
        </div>

        <span class="title-small">🎨 Màu nền khung ảnh</span>
        <div class="slider" id="bg-list"></div>

        <span class="title-small">🐰 Kho Sticker Cute (Bấm để dán lên ảnh)</span>
        <div class="slider" id="sticker-list"></div>

        <span class="title-small">✏️ Viết lời nhắn gửi</span>
        <input type="text" id="text-input" class="text-input" placeholder="Viết gì đó thật ngọt ngào...">
        
        <div class="slider" id="font-list">
            <button class="opt-btn active" onclick="curFont='Quicksand',updateF(this)">Hiện đại</button>
            <button class="opt-btn" onclick="curFont='Pacifico',updateF(this)" style="font-family:Pacifico">Cực Xinh</button>
            <button class="opt-btn" onclick="curFont='Mali',updateF(this)" style="font-family:Mali">Dễ thương</button>
            <button class="opt-btn" onclick="curFont='Dancing Script',updateF(this)" style="font-family:'Dancing Script'">Bay bổng</button>
            <button class="opt-btn" onclick="curFont='Lobster',updateF(this)" style="font-family:Lobster">Nghệ thuật</button>
            <button class="opt-btn" onclick="curFont='Patrick Hand',updateF(this)" style="font-family:'Patrick Hand'">Viết tay</button>
        </div>

        <span class="title-small">🖌️ Chọn màu chữ</span>
        <div class="slider" id="text-color-list"></div>
        
        <button class="btn" onclick="addText()">✏️ DÁN CHỮ LÊN ẢNH</button>
        <button class="btn" style="background:#e74c3c; box-shadow:0 4px 0 #b3392b;" onclick="clearStickers()">🗑️ XÓA HẾT TRANG TRÍ</button>
    </section>

    <section class="step-block">
        <span class="title-small">📥 Bước 3: Xem & Tải kết quả</span>
        
        <div id="result-area">
            <canvas id="canvas"></canvas>
            <div id="sticker-layer"></div>
        </div>

        <button class="btn" style="background:var(--blue-btn); box-shadow:0 4px 0 #2a52a3; margin-top:20px;" onclick="download()">📥 TẢI ẢNH VỀ ĐIỆN THOẠI</button>
        <button class="btn" style="background:#888; box-shadow:0 4px 0 #555;" onclick="resetTiem()">🔄 CHỤP LẠI MỚI</button>
        
        <p style="text-align:center; font-size:10px; color:#ccc; margin-top:15px;">© Tiệm PhotoBooth nhà Cún - Chúc bạn có những bức ảnh đẹp!</p>
    </section>

</div>

<script>
    /* -----------------------------------------------------------
       PHẦN JAVASCRIPT: BỘ NÃO CỦA TIỆM PHOTOBOOTH
    ----------------------------------------------------------- */
    
    // Biến lưu trữ trạng thái
    let photos = [], maxPhotos = 4, layoutDir = 'v', bg = '#ffffff', curFont = 'Quicksand', curColor = '#ff6699', currentFilter = 'none', track = null;
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d'), video = document.getElementById('video'), sLayer = document.getElementById('sticker-layer');

    // 🎥 Khởi động Camera ngay khi mở trang
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(s => { video.srcObject = s; track = s.getVideoTracks()[0]; })
        .catch(() => alert("Bạn ơi, nhớ bật Camera để tiệm hoạt động nha! ❤️"));

    // 🔦 Hàm bật/tắt Đèn pin (Dành cho Mobile)
    async function toggleTorch() {
        if (!track) return;
        const caps = track.getCapabilities();
        if (!caps.torch) return alert("Rất tiếc, thiết bị không hỗ trợ đèn pin!");
        const isOff = !track.getSettings().torch;
        await track.applyConstraints({ advanced: [{ torch: isOff }] });
    }

    // 🎨 Áp dụng bộ lọc màu Filter
    function setFilter(f, btn) {
        currentFilter = f; video.style.filter = f;
        document.querySelectorAll('#filter-list .opt-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // 📸 Chụp ảnh đơn (Đếm ngược 3 giây)
    function capturePhoto() {
        if (photos.length >= maxPhotos) return alert("Đã đủ ảnh cho khung rồi nha!");
        let t = 3;
        const cEl = document.getElementById('countdown');
        const timer = setInterval(() => {
            cEl.innerText = t;
            if (t <= 0) {
                clearInterval(timer); cEl.innerText = "";
                // Hiệu ứng Flash trắng
                const flash = document.getElementById('flash-overlay');
                flash.classList.add('flash-active');
                setTimeout(() => flash.classList.remove('flash-active'), 300);
                saveFrame(); // Lưu ảnh
            }
            t--;
        }, 800);
    }

    // 🤖 Tự động chụp 4 tấm liên tiếp
    async function startAutoCapture() {
        photos = []; draw();
        for (let i = 0; i < maxPhotos; i++) {
            capturePhoto();
            await new Promise(r => setTimeout(r, 4500)); // Chờ đếm ngược và chụp xong
        }
    }

    // 🎞️ Chụp khung hình từ Video sang Canvas tạm
    function saveFrame() {
        const tmp = document.createElement('canvas');
        tmp.width = video.videoWidth; tmp.height = video.videoHeight;
        const tCtx = tmp.getContext('2d');
        tCtx.filter = currentFilter;
        tCtx.translate(tmp.width, 0); tCtx.scale(-1, 1); // Lật gương
        tCtx.drawImage(video, 0, 0);
        const img = new Image(); img.src = tmp.toDataURL();
        img.onload = () => { photos.push(img); draw(); };
    }

    // 🖼️ HÀM VẼ CHÍNH: Tạo khung ảnh không bị méo (Object-fit: Cover)
    function draw() {
        const s = 2; // Độ phân giải cao 2x
        canvas.width = (layoutDir === 'v') ? 300 * s : (220 * maxPhotos + 40) * s;
        canvas.height = (layoutDir === 'v') ? (110 * maxPhotos + 60) * s : 350 * s;
        ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height);

        photos.forEach((img, i) => {
            let tw = layoutDir==='v' ? (canvas.width - 40*s) : (200*s);
            let th = layoutDir==='v' ? (100*s) : (canvas.height - 80*s);
            let x = layoutDir==='v' ? (20*s) : (20*s + i*(tw+10*s));
            let y = layoutDir==='v' ? (20*s + i*(th+10*s)) : (25*s);

            ctx.save();
            ctx.beginPath(); ctx.roundRect(x, y, tw, th, 6*s); ctx.clip();
            // Logic Cắt trung tâm (Center Crop)
            let ir = img.width / img.height, tr = tw / th;
            let sx, sy, sw, sh;
            if (ir > tr) { sh = img.height; sw = img.height * tr; sx = (img.width - sw) / 2; sy = 0; }
            else { sw = img.width; sh = img.width / tr; sx = 0; sy = (img.height - sh) / 2; }
            ctx.drawImage(img, sx, sy, sw, sh, x, y, tw, th);
            ctx.restore();
        });
        
        // Vẽ tên tiệm ở chân ảnh
        ctx.fillStyle = (bg==='#ffffff' || bg==='#fff0f3') ? '#ff6699' : '#fff';
        ctx.font = `bold ${13*s}px Quicksand`; ctx.textAlign = 'center';
        ctx.fillText("Tiệm PhotoBooth nhà Cún ❤️", canvas.width/2, canvas.height - 12*s);
    }

    // 📤 Xử lý tải ảnh từ thiết bị
    function handleUpload(e) {
        Array.from(e.target.files).forEach(file => {
            if (photos.length >= maxPhotos) return;
            const r = new FileReader();
            r.onload = (ev) => {
                const img = new Image(); img.src = ev.target.result;
                img.onload = () => { photos.push(img); draw(); };
            };
            r.readAsDataURL(file);
        });
    }

    // 🐰 Tạo Sticker mới
    function addSticker(emoji) {
        const d = document.createElement('div'); d.className = 'draggable'; d.innerText = emoji;
        d.style.left = '40%'; d.style.top = '40%'; d.style.fontSize = '50px';
        makeDrag(d); sLayer.appendChild(d);
    }

    // ✏️ Tạo lời nhắn Chữ mới
    function addText() {
        const val = document.getElementById('text-input').value; if(!val) return;
        const d = document.createElement('div'); d.className = 'draggable'; d.innerText = val;
        d.style.left = '30%'; d.style.top = '30%'; d.style.color = curColor; d.style.fontFamily = curFont; d.style.fontSize = '28px';
        makeDrag(d); sLayer.appendChild(d);
    }

    // 🖐️ Logic kéo thả Sticker & Chữ (Touch & Mouse)
    function makeDrag(el) {
        let x=0, y=0, drag=false;
        el.onmousedown = el.ontouchstart = (e) => {
            drag = false; const t = e.touches ? e.touches[0] : e;
            x = t.clientX - el.offsetLeft; y = t.clientY - el.offsetTop;
            document.onmousemove = document.ontouchmove = (ev) => {
                drag = true; const t2 = ev.touches ? ev.touches[0] : ev;
                el.style.left = (t2.clientX - x) + 'px'; el.style.top = (t2.clientY - y) + 'px';
            };
            document.onmouseup = document.ontouchend = () => {
                document.onmousemove = document.ontouchmove = null;
                // Click (không kéo) để xóa
                if (!drag) { if(confirm("Xóa trang trí này nhé?")) el.remove(); }
            };
        };
    }

    // 🧹 Xóa hết mọi thứ
    function clearStickers() { if(confirm("Xóa hết tất cả sticker và chữ nhé?")) sLayer.innerHTML = ""; }
    function resetTiem() { if(confirm("Bạn muốn chụp lại bộ ảnh mới?")) { photos = []; draw(); sLayer.innerHTML = ""; } }

    // 📐 Cài đặt Bố cục khung
    function setLayout(n,d,btn) {
        maxPhotos = n; layoutDir = d;
        document.querySelectorAll('#layout-list .opt-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); photos = []; draw();
    }
    
    // 🔡 Cập nhật Font đang chọn
    function updateF(btn) {
        document.querySelectorAll('#font-list .opt-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // 📥 Lưu ảnh về máy
    function download() {
        const link = document.createElement('a'); 
        link.download = 'tiem-nha-cun-' + Date.now() + '.png';
        link.href = canvas.toDataURL('image/png'); link.click();
    }

    /* 🌈 KHỞI TẠO DỮ LIỆU KHO MÀU & STICKER */
    
    // 1. Màu sắc phong phú
    const colorPalette = [
        '#ffffff','#fff0f3','#ffeaeb','#fde2ff','#e6e6fa','#e0ffff','#d1f2eb','#fef9e7','#333333','#000000',
        '#ff5e5e','#5eafff','#75ff5e','#ff9a5e','#ff5eba','#a25eff','#5efff4'
    ];
    colorPalette.forEach(c => {
        // Màu nền khung
        const dot = document.createElement('div'); dot.className = 'color-dot'; dot.style.background = c;
        dot.onclick = () => { bg = c; draw(); }; document.getElementById('bg-list').appendChild(dot);
        // Màu chữ
        const tdot = document.createElement('div'); tdot.className = 'color-dot'; tdot.style.background = c;
        tdot.onclick = () => curColor = c; document.getElementById('text-color-list').appendChild(tdot);
    });

    // 2. Kho Sticker đa dạng
    const stickerPack = [
        '❤️','✨','🎀','🌸','🧸','🐾','🍓','🌈','🍭','📷','🐶','🐱','🎈','🌟','💖','🍑','🍪','🎉','🐥','☁️',
        '🍀','🔥','🍩','🍦','🍟','🍕','🦄','🦋','🌼','🌻','🌷','🎁','💎','👑','👒','🕶️','👟','🧁','🥤'
    ];
    stickerPack.forEach(s => {
        const span = document.createElement('span'); 
        span.style.fontSize='35px'; span.style.cursor='pointer'; span.style.flexShrink='0'; span.innerText = s;
        span.onclick = () => addSticker(s); document.getElementById('sticker-list').appendChild(span);
    });

    // Thiết lập mặc định
    setLayout(4, 'v', document.querySelectorAll('#layout-list .opt-btn')[2]);
</script>
</body>
</html>
